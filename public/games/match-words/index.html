<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match the Words Game! 🌟</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            font-family: 'Fredoka One', cursive;
            user-select: none;
            touch-action: none; /* Prevent scroll on touch devices */
            display: flex;
            height: 100vh;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 250px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            box-shadow: 5px 0 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            z-index: 200;
            border-right: 2px solid rgba(255, 255, 255, 0.6);
            overflow-y: auto;
            max-height: 100vh;
        }

        /* Styling scrollbar for sidebar */
        .sidebar::-webkit-scrollbar {
            width: 6px;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background-color: rgba(255, 107, 107, 0.4);
            border-radius: 10px;
        }

        .sidebar h2 {
            color: #ff6b6b;
            font-size: 2rem;
            margin-bottom: 25px;
            text-shadow: 2px 2px 0 #fff;
            text-align: center;
            letter-spacing: 1px;
        }

        .topic-btn {
            background: #fff;
            border: 4px solid #ff9f43;
            border-radius: 20px;
            padding: 15px 20px;
            margin: 10px 0;
            width: 80%;
            font-size: 1.5rem;
            font-family: 'Fredoka One', cursive;
            color: #ff9f43;
            cursor: pointer;
            box-shadow: 0 5px 0 #ff9f43;
            transition: all 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 15px;
        }

        .topic-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 0 #ff9f43;
        }

        .topic-btn:active, .topic-btn.active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #feca57;
            background: #ff9f43;
            color: #fff;
            border-color: #feca57;
        }

        /* Game Area Styles */
        .game-area {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
        }

        .title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3rem;
            color: #ff6b6b;
            text-align: center;
            width: 100%;
            text-shadow: 3px 3px 0 #fff, -3px -3px 0 #fff, 3px -3px 0 #fff, -3px 3px 0 #fff, 6px 6px 15px rgba(0,0,0,0.2);
            z-index: 100;
            pointer-events: none;
            animation: bounceIn 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: none;
        }

        @keyframes bounceIn {
            0% { transform: translate(-50%, -100px) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, 0) scale(1); opacity: 1; }
        }

        .game-item-image {
            position: absolute;
            font-size: 5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.7);
            border: 5px dashed #ff9ff3;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: border-color 0.3s, background 0.3s;
            overflow: hidden;
            box-sizing: border-box;
            /* width & height được gán bằng JS theo kích thước màn hình */
            min-height: 60px;
        }

        /* Emoji giữ khung vuông */
        .game-item-image.is-emoji {
            height: var(--card-w, 130px);
        }

        .game-item-image img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 15px;
            padding: 6px;
            box-sizing: border-box;
        }

        .game-item-image.matched {
            border: 5px solid #1dd1a1 !important;
            background: rgba(29, 209, 161, 0.3) !important;
            animation: happyDance 0.5s ease;
        }

        @keyframes happyDance {
            0% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.2) rotate(-15deg); }
            50% { transform: scale(1.2) rotate(15deg); }
            75% { transform: scale(1.2) rotate(-15deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .game-item-text {
            position: absolute;
            font-size: 1.1rem;
            padding: 8px 15px;
            color: #fff;
            border-radius: 50px;
            box-shadow: 0 8px 0 rgba(0,0,0,0.2), 0 15px 20px rgba(0,0,0,0.2);
            cursor: grab;
            transition: transform 0.1s;
            z-index: 50;
            text-transform: uppercase;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        .game-item-text:active, .game-item-text.dragging {
            cursor: grabbing;
            transform: scale(1.15) translateY(-10px) rotate(-3deg);
            box-shadow: 0 0 0 rgba(0,0,0,0.2), 0 20px 25px rgba(0,0,0,0.3);
            z-index: 1000 !important;
        }

        .particle {
            position: absolute;
            pointer-events: none;
            font-size: 2.5rem;
            animation: pop 1s ease-out forwards;
            z-index: 999;
        }

        @keyframes pop {
            0% { transform: scale(0.5) translate(0, 0); opacity: 1; }
            100% { transform: scale(1.5) translate(var(--tx), var(--ty)); opacity: 0; }
        }

        .confetti {
            position: absolute;
            width: 15px;
            height: 15px;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 9999;
            border-radius: 3px;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); }
        }
        
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.6;
            animation: floatCloud linear infinite;
            z-index: 10;
            pointer-events: none;
        }
        
        @keyframes floatCloud {
            from { transform: translateX(-200px); }
            to { transform: translateX(100vw); }
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { 
                width: 100%; 
                height: auto; 
                padding: 10px 0; 
                flex-direction: row; 
                flex-wrap: wrap; 
                justify-content: center; 
                border-right: none;
                border-bottom: 2px solid rgba(255, 255, 255, 0.6);
            }
            .sidebar h2 { display: none; }
            .topic-btn { 
                width: auto; 
                margin: 5px; 
                padding: 10px 15px; 
                font-size: 1.2rem; 
                gap: 5px;
            }
            .title { font-size: 2rem; top: 10px; }
            .game-item-image { font-size: 3.5rem; }
            .game-item-text { font-size: 1.5rem; padding: 10px 25px; }
        }

        /* Start Overlay */
        #startOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }
        .play-btn {
            background: #ff6b6b;
            color: white;
            font-family: 'Fredoka One', cursive;
            font-size: 3rem;
            padding: 20px 50px;
            border: 8px solid white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 0 #ee5253, 0 20px 30px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .play-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 0 #ee5253, 0 25px 35px rgba(0,0,0,0.3);
        }
        .play-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #ee5253, 0 5px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <!-- Start Overlay -->
    <div id="startOverlay">
        <div style="font-size: 4rem; color: white; text-shadow: 3px 3px 0 #ff6b6b; margin-bottom: 40px; text-align: center;">Ready to Play?</div>
        <button class="play-btn" id="startBtn">▶ PLAY</button>
    </div>

    <!-- Sidebar with Categories -->
    <div class="sidebar">
        <h2>📚 Topics</h2>
    </div>

    <!-- Game Area -->
    <div class="game-area" id="gameArea">
        <!-- Loading Overlay -->
        <div id="loadingOverlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(161, 196, 253, 0.9); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(5px); transition: opacity 0.5s;">
            <div style="width: 60px; height: 60px; border: 6px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <div style="color: white; font-size: 1.8rem; margin-top: 20px; font-weight: bold; letter-spacing: 3px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2);">LOADING...</div>
            <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
        </div>

        <div class="title" id="titleText">Match the Words! 🌟</div>

        <!-- Background clouds -->
        <div class="cloud" style="width: 150px; height: 50px; top: 10%; animation-duration: 40s;"></div>
        <div class="cloud" style="width: 100px; height: 35px; top: 30%; animation-duration: 25s; animation-delay: 5s;"></div>
        <div class="cloud" style="width: 200px; height: 70px; top: 70%; animation-duration: 50s; animation-delay: 10s;"></div>
    </div>

    <audio id="bgMusic" loop>
        <source src="/sounds/bg-music.mp3" type="audio/mpeg">
    </audio>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const bgMusic = document.getElementById('bgMusic');
            bgMusic.volume = 0.3;
            
            const startOverlay = document.getElementById('startOverlay');
            const startBtn = document.getElementById('startBtn');
            
            startBtn.addEventListener('click', () => {
                bgMusic.play().catch(e => console.log("Audio play failed:", e));
                startOverlay.style.opacity = '0';
                setTimeout(() => {
                    startOverlay.style.display = 'none';
                }, 500);
            });
        });

        // Web Audio API Synthesizer Sound Effects
        function playSuccessSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                
                // First note (C5)
                const osc1 = ctx.createOscillator();
                const gain1 = ctx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(523.25, ctx.currentTime);
                gain1.gain.setValueAtTime(1.0, ctx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
                osc1.connect(gain1);
                gain1.connect(ctx.destination);
                osc1.start();
                osc1.stop(ctx.currentTime + 0.25);

                // Second note (E5) with a slight delay
                const osc2 = ctx.createOscillator();
                const gain2 = ctx.createGain();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(659.25, ctx.currentTime + 0.08);
                gain2.gain.setValueAtTime(1.0, ctx.currentTime + 0.08);
                gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
                osc2.connect(gain2);
                gain2.connect(ctx.destination);
                osc2.start(ctx.currentTime + 0.08);
                osc2.stop(ctx.currentTime + 0.35);
            } catch (e) {
                console.log("Web Audio error", e);
            }
        }

        function playErrorSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(160, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(70, ctx.currentTime + 0.22); // slide pitch down (boing)
                gain.gain.setValueAtTime(1.0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, ctx.currentTime + 0.22);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.22);
            } catch (e) {
                console.log("Web Audio error", e);
            }
        }

        function playWinSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6 arpeggio
                notes.forEach((freq, index) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, ctx.currentTime + index * 0.08);
                    gain.gain.setValueAtTime(0.8, ctx.currentTime + index * 0.08);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + index * 0.08 + 0.35);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(ctx.currentTime + index * 0.08);
                    osc.stop(ctx.currentTime + index * 0.08 + 0.35);
                });
            } catch (e) {
                console.log("Web Audio error", e);
            }
        }

        const preloadedAudio = {};

        async function speakWord(wordText) {
            let spoken = false;
            try {
                // Check if audio is already preloaded
                if (preloadedAudio[wordText]) {
                    const audio = new Audio(preloadedAudio[wordText]);
                    audio.volume = 1.0;
                    await audio.play();
                    return;
                }

                // Try using Google AI Studio Gemini API is temporarily disabled 
                // due to exhausted quota to prevent 15-second timeout delays.
                
            } catch (err) {
                console.error("Audio playback error", err);
            }

            // Fallback to Web Speech API
            if (!spoken) {
                try {
                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.cancel();
                        const utterance = new SpeechSynthesisUtterance(wordText);
                        utterance.lang = 'en-US';
                        utterance.rate = 0.85;
                        utterance.pitch = 1.15;
                        utterance.volume = 1.0;
                        window.speechSynthesis.speak(utterance);
                    }
                } catch (e) {
                    console.log("SpeechSynthesis error", e);
                }
            }
        }
        // Parse Query Parameter for Age Group
        const urlParams = new URLSearchParams(window.location.search);
        const ageGroup = urlParams.get('age') || '2-5';
        const gameId = urlParams.get('gameId');

                // Data from API
        let topicsData = {};
        let defaultTopic = '';
        let currentTopic = '';

        let matchedCount = 0;
        let elements = []; // Stores state for all elements
        let animationId; // Keep track of animation loop
        const gameArea = document.getElementById('gameArea');

        // Dynamically Render Sidebar Buttons
        function renderSidebar() {
            const sidebar = document.querySelector('.sidebar');
            sidebar.innerHTML = '<h2>📚 Topics</h2>';
            
            Object.keys(topicsData).forEach((key) => {
                const btn = document.createElement('button');
                btn.className = 'topic-btn' + (key === currentTopic ? ' active' : '');
                btn.innerHTML = topicsData[key].icon;
                btn.onclick = () => loadTopic(key, btn);
                sidebar.appendChild(btn);
            });
        }

        // Function to switch topic
        function loadTopic(topicKey, btnElement) {
            document.querySelectorAll('.topic-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            currentTopic = topicKey;
            init();
        }

        // Tính chiều rộng đồng bộ cho tất cả thẻ ảnh dựa vào kích thước game area
        function computeCardWidth() {
            const gameAreaRect = gameArea.getBoundingClientRect();
            const W = gameAreaRect.width;
            const isMobile = W <= 768;
            const itemsCount = topicsData[currentTopic] ? topicsData[currentTopic].items.length : 6;

            let cardW;
            if (isMobile) {
                // Mobile: 3 cột, chiều rộng thẻ ~90% chiều rộng cột
                cardW = Math.min(160, Math.max(90, Math.floor((W / 3) * 0.9)));
            } else {
                // Desktop: chia đều theo số item, lấy ~88% chiều rộng cột
                const colWidth = W / itemsCount;
                cardW = Math.min(260, Math.max(130, Math.floor(colWidth * 0.88)));
            }

            // Áp chiều rộng lên tất cả thẻ ảnh đang tồn tại
            elements.forEach(obj => {
                if (obj.type === 'img') {
                    obj.el.style.width = cardW + 'px';
                    obj.el.style.setProperty('--card-w', cardW + 'px');
                    if (obj.el.classList.contains('is-emoji')) {
                        obj.el.style.height = cardW + 'px';
                    } else {
                        obj.el.style.height = 'auto';
                    }
                }
            });

            return cardW;
        }

        // Calculate layout coordinates (used for starting positions and resizing)
        function calculateLayout() {
            const gameAreaRect = gameArea.getBoundingClientRect();
            const W = gameAreaRect.width;
            const H = gameAreaRect.height;
            const isMobile = W <= 768;

            const itemsCount = topicsData[currentTopic].items.length;

            elements.forEach(obj => {
                const elemWidth = obj.el.offsetWidth || 130;
                const elemHeight = obj.el.offsetHeight || (obj.el.classList.contains('is-emoji') ? elemWidth : 80);

                if (isMobile) {
                    // Mobile grid layout: 3 columns x 2 rows
                    const colWidth = W / 3;
                    if (obj.type === 'img') {
                        const col = obj.index % 3;
                        const row = Math.floor(obj.index / 3);
                        obj.startX = colWidth * col + (colWidth - elemWidth) / 2;
                        obj.startY = 75 + row * 110;
                    } else {
                        const col = obj.shuffledIndex % 3;
                        const row = Math.floor(obj.shuffledIndex / 3);
                        obj.startX = colWidth * col + (colWidth - elemWidth) / 2;
                        obj.startY = H - 180 + row * 75;
                    }
                } else {
                    // Desktop horizontal row layout
                    const colWidth = W / itemsCount;
                    if (obj.type === 'img') {
                        obj.startX = colWidth * obj.index + (colWidth - elemWidth) / 2;
                        obj.startY = H * 0.22;
                    } else {
                        obj.startX = colWidth * obj.shuffledIndex + (colWidth - elemWidth) / 2;
                        obj.startY = H * 0.62;
                    }
                }
            });
        }

        function updatePosition(obj) {
            const elemWidth = obj.el.offsetWidth || (obj.type === 'img' ? 130 : 160);
            const elemHeight = obj.el.offsetHeight || (obj.type === 'img' ? 130 : 70);
            obj.el.style.left = (obj.x - elemWidth / 2) + 'px';
            obj.el.style.top = (obj.y - elemHeight / 2) + 'px';
        }

        // Initialize or Restart Game
        function init() {
            // Hide loading overlay
            const loader = document.getElementById('loadingOverlay');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }

            // Render sidebar if not done yet
            const sidebar = document.querySelector('.sidebar');
            if (sidebar.children.length <= 1) {
                renderSidebar();
            }
            
            // Clear old game elements (keep title and clouds)
            const dynamicElements = gameArea.querySelectorAll('.game-item-image, .game-item-text, .confetti, .particle');
            dynamicElements.forEach(el => el.remove());

            // Reset game state
            matchedCount = 0;
            elements = [];
            
            const topic = topicsData[currentTopic];
            
            // Update Title and animate it
            const titleEl = document.getElementById('titleText');
            titleEl.textContent = topic.title;
            titleEl.style.color = '#ff6b6b';
            titleEl.style.animation = 'none';
            titleEl.offsetHeight; // trigger reflow
            titleEl.style.animation = 'bounceIn 1s cubic-bezier(0.68, -0.55, 0.265, 1.55)';

            // Preload audio for all items in the current topic asynchronously
            topic.items.forEach(item => {
                if (item.audio) {
                    preloadedAudio[item.word] = item.audio;
                } else if (!preloadedAudio[item.word]) {
                    // Preloading from /api/tts is temporarily disabled to prevent
                    // quota exhaustion and timeout delays.
                }
            });

            // Prepare shuffled indices for word placement
            const items = topic.items;
            const indices = Array.from({ length: items.length }, (_, i) => i);
            const shuffledIndices = [...indices];
            // Fisher-Yates shuffle
            for (let i = shuffledIndices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledIndices[i], shuffledIndices[j]] = [shuffledIndices[j], shuffledIndices[i]];
            }

            // Create new items for the selected topic
            items.forEach((item, index) => {
                // 1. Create Drop Zone (Emoji or Image)
                const imgEl = document.createElement('div');
                imgEl.classList.add('game-item-image');
                if (item.image) {
                    const imgNode = document.createElement('img');
                    imgNode.src = item.image;
                    imgEl.appendChild(imgNode);
                    // Khi ảnh tải xong, cập nhật lại radius vật lý theo kích thước thực
                    imgNode.onload = () => {
                        const imgObj = elements.find(o => o.el === imgEl);
                        if (imgObj) {
                            const w = imgEl.offsetWidth || 130;
                            const h = imgEl.offsetHeight || 80;
                            imgObj.radius = Math.max(w, h) / 2 + 35;
                            if (!imgObj.matched) updatePosition(imgObj);
                        }
                    };
                } else {
                    imgEl.textContent = item.emoji;
                    imgEl.classList.add('is-emoji');
                }
                imgEl.style.borderColor = item.imgColor || item.color;
                imgEl.style.backgroundColor = (item.imgColor || item.color) + '22'; // 13% opacity for a nice pastel background tint
                gameArea.appendChild(imgEl);
                
                // 2. Create Draggable Text
                const txtEl = document.createElement('div');
                txtEl.classList.add('game-item-text');
                txtEl.textContent = item.word;
                txtEl.style.backgroundColor = item.txtColor || item.color;
                txtEl.style.border = `4px solid ${item.txtBorder || item.border}`;
                gameArea.appendChild(txtEl);

                const shuffledIndex = shuffledIndices[index];

                // Initial state setup
                const imgObj = { 
                    id: item.id, 
                    el: imgEl, 
                    type: 'img', 
                    matched: false, 
                    index: index, 
                    shuffledIndex: shuffledIndex,
                    x: 0, 
                    y: 0,
                    vx: 0,
                    vy: 0,
                    radius: 65
                };
                const txtObj = { 
                    id: item.id, 
                    el: txtEl, 
                    type: 'txt', 
                    matched: false, 
                    index: index, 
                    shuffledIndex: shuffledIndex,
                    x: 0, 
                    y: 0, 
                    vx: 0,
                    vy: 0,
                    radius: 80,
                    dragging: false 
                };

                // Initialize random slow velocities
                const speedImg = Math.random() * 0.4 + 0.4;
                const angleImg = Math.random() * Math.PI * 2;
                imgObj.vx = Math.cos(angleImg) * speedImg;
                imgObj.vy = Math.sin(angleImg) * speedImg;

                const speedTxt = Math.random() * 0.4 + 0.4;
                const angleTxt = Math.random() * Math.PI * 2;
                txtObj.vx = Math.cos(angleTxt) * speedTxt;
                txtObj.vy = Math.sin(angleTxt) * speedTxt;

                elements.push(imgObj, txtObj);

                // Setup Custom Dragging
                setupDrag(txtObj, imgEl, item.word);
            });

            // Áp kích thước đồng bộ trước khi tính layout
            computeCardWidth();

            // Set positions based on initial layout coordinates
            calculateLayout();
            elements.forEach(obj => {
                const elemWidth = obj.el.offsetWidth || 130;
                const elemHeight = obj.el.offsetHeight || (obj.type === 'img' ? elemWidth : 70);
                obj.x = obj.startX + elemWidth / 2;
                obj.y = obj.startY + elemHeight / 2;
                obj.radius = Math.max(elemWidth, elemHeight) / 2 + 5;
                updatePosition(obj);
            });

            // Start animation loop if not running
            if (animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(animate);
        }

        // Bouncing and movement logic
        function animate() {
            const gameAreaRect = gameArea.getBoundingClientRect();
            const W = gameAreaRect.width;
            const H = gameAreaRect.height;
            const isMobile = W <= 768;
            const topMargin = isMobile ? 15 : 15;
            const padding = 15;

            // 1. Update velocities and check boundary bounces
            elements.forEach(obj => {
                if (obj.matched) return; // locked items do not float
                if (obj.dragging) return; // dragged item position is set by cursor

                const elemWidth = obj.el.offsetWidth || (obj.type === 'img' ? 130 : 160);
                const elemHeight = obj.el.offsetHeight || (obj.type === 'img' ? 130 : 70);
                
                // Add more padding for images (circles) so they stay further apart
                const extraPadding = obj.type === 'img' ? 35 : 15;
                obj.radius = Math.max(elemWidth, elemHeight) / 2 + extraPadding;

                // Move element
                obj.x += obj.vx;
                obj.y += obj.vy;

                // Bounce off left/right edges
                if (obj.x - obj.radius < padding) {
                    obj.x = padding + obj.radius;
                    obj.vx = Math.abs(obj.vx);
                } else if (obj.x + obj.radius > W - padding) {
                    obj.x = W - padding - obj.radius;
                    obj.vx = -Math.abs(obj.vx);
                }

                // Bounce off top/bottom edges
                if (obj.y - obj.radius < topMargin) {
                    obj.y = topMargin + obj.radius;
                    obj.vy = Math.abs(obj.vy);
                } else if (obj.y + obj.radius > H - padding) {
                    obj.y = H - padding - obj.radius;
                    obj.vy = -Math.abs(obj.vy);
                }
            });

            // 2. Resolve element-to-element collisions (bouncing off each other)
            for (let i = 0; i < elements.length; i++) {
                const obj1 = elements[i];

                for (let j = i + 1; j < elements.length; j++) {
                    const obj2 = elements[j];

                    // If both are matched, they stay still
                    if (obj1.matched && obj2.matched) continue;

                    // Allow texts and images to float over each other without bouncing
                    // ONLY if both are NOT matched.
                    // If one is matched, we want ALL floating items to bounce off it to prevent overlapping matched items.
                    if (!obj1.matched && !obj2.matched) {
                        if (!obj1.dragging && !obj2.dragging && obj1.type !== obj2.type) {
                            continue;
                        }
                    }

                    const dx = obj2.x - obj1.x;
                    const dy = obj2.y - obj1.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const minDist = obj1.radius + obj2.radius;

                    if (dist < minDist) {
                        const overlap = minDist - dist;
                        const nx = dx / (dist || 1);
                        const ny = dy / (dist || 1);

                        if (obj1.matched) {
                            // obj1 is static. Push obj2 away.
                            if (!obj2.dragging) {
                                obj2.x += nx * overlap;
                                obj2.y += ny * overlap;
                                // Reverse velocity (bounce)
                                obj2.vx = nx * Math.abs(obj2.vx);
                                obj2.vy = ny * Math.abs(obj2.vy);
                            }
                        } else if (obj2.matched) {
                            // obj2 is static. Push obj1 away.
                            if (!obj1.dragging) {
                                obj1.x -= nx * overlap;
                                obj1.y -= ny * overlap;
                                // Reverse velocity (bounce)
                                obj1.vx = -nx * Math.abs(obj1.vx);
                                obj1.vy = -ny * Math.abs(obj1.vy);
                            }
                        } else {
                            // Neither is matched (both are active: dragging or floating)
                            if (!obj1.dragging && !obj2.dragging) {
                                // Both are floating: push apart equally
                                obj1.x -= nx * overlap * 0.5;
                                obj1.y -= ny * overlap * 0.5;
                                obj2.x += nx * overlap * 0.5;
                                obj2.y += ny * overlap * 0.5;

                                // Elastic bounce velocities
                                const kx = obj1.vx - obj2.vx;
                                const ky = obj1.vy - obj2.vy;
                                const p = kx * nx + ky * ny;

                                if (p > 0) {
                                    obj1.vx -= p * nx;
                                    obj1.vy -= p * ny;
                                    obj2.vx += p * nx;
                                    obj2.vy += p * ny;
                                }
                            } else if (obj1.dragging) {
                                // obj1 is dragged. If obj1 is text and obj2 is image, allow overlap.
                                if (obj1.type === 'txt' && obj2.type === 'img') {
                                    // Allow overlap
                                } else {
                                    // Push obj2 away
                                    obj2.x += nx * overlap;
                                    obj2.y += ny * overlap;
                                    obj2.vx = nx * Math.abs(obj2.vx);
                                    obj2.vy = ny * Math.abs(obj2.vy);
                                }
                            } else if (obj2.dragging) {
                                // obj2 is dragged. If obj2 is text and obj1 is image, allow overlap.
                                if (obj2.type === 'txt' && obj1.type === 'img') {
                                    // Allow overlap
                                } else {
                                    // Push obj1 away
                                    obj1.x -= nx * overlap;
                                    obj1.y -= ny * overlap;
                                    obj1.vx = -nx * Math.abs(obj1.vx);
                                    obj1.vy = -ny * Math.abs(obj1.vy);
                                }
                            }
                        }
                    }
                }
            }

            // 3. Render position updates
            elements.forEach(obj => {
                if (!obj.dragging) {
                    updatePosition(obj);
                }
            });

            animationId = requestAnimationFrame(animate);
        }

        // Custom drag logic
        function setupDrag(txtObj, imgEl, wordText) {
            let startX, startY, initialX, initialY;

            txtObj.el.addEventListener('pointerdown', (e) => {
                if (txtObj.matched) return;
                
                txtObj.dragging = true;
                txtObj.el.classList.add('dragging');
                txtObj.el.style.transition = '';
                
                startX = e.clientX;
                startY = e.clientY;
                initialX = txtObj.x;
                initialY = txtObj.y;
            });

            document.addEventListener('pointermove', (e) => {
                if (!txtObj.dragging) return;
                
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                
                txtObj.x = initialX + dx;
                txtObj.y = initialY + dy;
                updatePosition(txtObj);
            });

            document.addEventListener('pointerup', (e) => {
                if (!txtObj.dragging) return;
                
                txtObj.dragging = false;
                txtObj.el.classList.remove('dragging');

                // Check collision based on bounding boxes
                const txtRect = txtObj.el.getBoundingClientRect();
                const imgRect = imgEl.getBoundingClientRect();

                const isOverlap = !(
                    txtRect.right < imgRect.left || 
                    txtRect.left > imgRect.right || 
                    txtRect.bottom < imgRect.top || 
                    txtRect.top > imgRect.bottom
                );

                if (isOverlap) {
                    // 🎉 Matched Successfully!
                    txtObj.matched = true;
                    
                    const imgObj = elements.find(o => o.el === imgEl);
                    imgObj.matched = true;

                    // Stop velocities
                    imgObj.vx = 0; imgObj.vy = 0;
                    txtObj.vx = 0; txtObj.vy = 0;

                    // Snap the text elegantly below the image inside the game area
                    txtObj.x = imgObj.x;
                    const _imgH = imgEl.offsetHeight || 80;
                    const _txtH = txtObj.el.offsetHeight || 55;
                    txtObj.y = imgObj.y + (_imgH / 2) + (_txtH / 2) - 10; // snapped offset
                    
                    txtObj.el.style.transition = 'left 0.2s ease-out, top 0.2s ease-out';
                    updatePosition(txtObj);
                    setTimeout(() => {
                        txtObj.el.style.transition = '';
                    }, 200);
                    
                    imgEl.classList.add('matched');
                    playSuccessSound();
                    speakWord(wordText);
                    
                    createParticles(e.clientX, e.clientY);
                    
                    matchedCount++;
                    const totalItems = topicsData[currentTopic].items.length;
                    if (matchedCount === totalItems) {
                        setTimeout(winGame, 800);
                    }
                } else {
                    // ❌ Missed! Play funny mismatch sound if overlapping wrong target
                    const anyWrongOverlap = elements.some(otherObj => {
                        if (otherObj.type === 'img' && otherObj.el !== imgEl && !otherObj.matched) {
                            const otherRect = otherObj.el.getBoundingClientRect();
                            return !(txtRect.right < otherRect.left || txtRect.left > otherRect.right || txtRect.bottom < otherRect.top || txtRect.top > otherRect.bottom);
                        }
                        return false;
                    });

                    if (anyWrongOverlap) {
                        playErrorSound();
                    }
                }
            });
        }

        // Fun star explosion effect on correct match
        function createParticles(x, y) {
            const emojis = ['⭐', '✨', '💖', '🌟'];
            for(let i = 0; i < 12; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                
                const gameAreaRect = gameArea.getBoundingClientRect();
                p.style.left = (x - gameAreaRect.left) + 'px';
                p.style.top = (y - gameAreaRect.top) + 'px';
                
                const tx = (Math.random() - 0.5) * 250 + 'px';
                const ty = (Math.random() - 0.5) * 250 + 'px';
                p.style.setProperty('--tx', tx);
                p.style.setProperty('--ty', ty);
                
                gameArea.appendChild(p);
                setTimeout(() => p.remove(), 1000);
            }
        }

        // Winning animation
        function winGame() {
            playWinSound();
            
            const title = document.getElementById('titleText');
            title.textContent = 'YOU WIN! 🎉🎉🎉';
            title.style.transform = 'translate(-50%, 0) scale(1.3)';
            title.style.transition = 'transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
            title.style.color = '#1dd1a1';
            
            // Shower confetti
            for(let i = 0; i < 120; i++) {
                const c = document.createElement('div');
                c.classList.add('confetti');
                c.style.left = Math.random() * 100 + '%';
                c.style.top = -20 + 'px';
                const colors = ['#ff6b6b', '#0abde3', '#feca57', '#1dd1a1', '#ff9ff3'];
                c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                // Randomize shape (some circles, some rectangles)
                if (Math.random() > 0.5) c.style.borderRadius = '50%';
                
                c.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                c.style.animationDelay = (Math.random() * 2) + 's';
                gameArea.appendChild(c);
            }
        }

        // Prevent screen resizing from breaking positions
        window.addEventListener('resize', () => {
            computeCardWidth();
            calculateLayout();
            elements.forEach(obj => {
                if (obj.matched) {
                    if (obj.type === 'img') {
                        const w = obj.el.offsetWidth || 130;
                        const h = obj.el.offsetHeight || w;
                        obj.x = obj.startX + w / 2;
                        obj.y = obj.startY + h / 2;
                    } else {
                        const imgObj = elements.find(o => o.type === 'img' && o.id === obj.id);
                        if (imgObj) {
                            obj.x = imgObj.x;
                            const imgH = imgObj.el.offsetHeight || 80;
                            const txtH = obj.el.offsetHeight || 55;
                            obj.y = imgObj.y + (imgH / 2) + (txtH / 2) - 10;
                        }
                    }
                    updatePosition(obj);
                } else {
                    // Keep unmatched elements inside boundaries
                    const gameAreaRect = gameArea.getBoundingClientRect();
                    const W = gameAreaRect.width;
                    const H = gameAreaRect.height;
                    const padding = 20;
                    if (obj.x > W - padding) obj.x = W - padding;
                    if (obj.y > H - padding) obj.y = H - padding;
                }
            });
        });

        // Initialize game on load
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const fetchUrl = gameId 
                    ? `/api/games/match-words?age=${ageGroup}&gameId=${gameId}`
                    : `/api/games/match-words?age=${ageGroup}`;
                const res = await fetch(fetchUrl);
                const data = await res.json();
                if (data && data.topicsData && Object.keys(data.topicsData).length > 0) {
                    topicsData = data.topicsData;
                    defaultTopic = data.defaultTopic;
                    currentTopic = defaultTopic;
                } else {
                    document.getElementById('titleText').textContent = 'No Topics Found';
                }
            } catch(e) {
                console.error(e);
            }
            init();
        });
    </script>
